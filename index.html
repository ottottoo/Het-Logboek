    var p = document.body || document.documentElement;

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

:6px 2px\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:9px\"><span style=\"font:600 14px var(--fbody);color:var(--muted,#9a8d79);width:13px\">3.<\u002Fspan><input value=\"{{ v.n3 }}\" oninput=\"{{ h.n3 }}\" placeholder=\"…\" style=\"flex:1;border:none;border-bottom:1.5px solid var(--line,#dccfb8);background:transparent;font:400 var(--fs,16px)/1.5 var(--fbody,'Mulish',sans-serif);color:var(--ink,#2c2722);padding:6px 2px\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ WEEK ============ -->\n      <sc-if value=\"{{ isWeek }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:6px 22px 120px\">\n        <div style=\"text-align:center;margin:8px 0 4px;font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.26em;text-transform:uppercase;color:var(--accent,#b08d57)\">Het Logboek<\u002Fdiv>\n        <div style=\"text-align:center;font:500 26px var(--fdisplay,'Playfair Display',serif);color:var(--ink,#2c2722);margin:2px 0 4px\">Weekvragen<\u002Fdiv>\n        <div style=\"text-align:center;font:400 13px/1.5 var(--fbody);color:var(--muted,#9a8d79);max-width:280px;margin:0 auto 22px\">Vijf vragen om jezelf beter te leren kennen. Neem er even rustig de tijd voor.<\u002Fdiv>\n\n        <sc-for list=\"{{ weekItems }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"margin-bottom:22px\">\n            <div style=\"display:flex;gap:11px;align-items:flex-start;margin-bottom:8px\">\n              <span style=\"font:500 17px var(--fdisplay,'Playfair Display',serif);color:var(--accent,#b08d57);line-height:1.35\">{{ item.n }}<\u002Fspan>\n              <div style=\"flex:1;font:500 14px/1.45 var(--fbody);color:var(--ink,#2c2722);padding-top:2px\">{{ item.q }}<\u002Fdiv>\n            <\u002Fdiv>\n            <textarea value=\"{{ item.val }}\" oninput=\"{{ item.on }}\" rows=\"2\" placeholder=\"…\" style=\"width:100%;border:none;border-bottom:1.5px solid var(--line,#dccfb8);background:transparent;font:400 var(--fs,16px)/1.85 var(--fbody,'Mulish',sans-serif);color:var(--ink,#2c2722);padding:4px 2px;min-height:42px;overflow:hidden\"><\u002Ftextarea>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"background:var(--accent,#b08d57);color:var(--onAccent,#fffaf0);border-radius:18px;padding:20px 20px;margin-top:8px\">\n          <div style=\"font:600 10px var(--flabel,'Karla',sans-serif);letter-spacing:0.16em;text-transform:uppercase;opacity:.85;margin-bottom:8px\">Uitdaging van de week<\u002Fdiv>\n          <div style=\"font:italic 500 16px/1.5 var(--quoteFont,'Playfair Display',serif);margin-bottom:16px\">{{ challenge }}<\u002Fdiv>\n          <div onclick=\"{{ toggleChallenge }}\" style=\"display:flex;align-items:center;gap:10px;cursor:pointer\">\n            <div style=\"width:24px;height:24px;border-radius:7px;border:1.5px solid var(--onAccent,#fffaf0);display:flex;align-items:center;justify-content:center;background:{{ challengeBox }}\">\n              <sc-if value=\"{{ cdone }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--accent,#b08d57);font:700 14px var(--fbody)\">✓<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <span style=\"font:600 13px var(--fbody)\">Volbracht<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ DOELEN ============ -->\n      <sc-if value=\"{{ isDoelen }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:6px 18px 120px\">\n        <div style=\"text-align:center;margin:8px 0 4px;font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.26em;text-transform:uppercase;color:var(--accent,#b08d57)\">Het Logboek<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:16px;margin:2px 0 4px\">\n          <div onclick=\"{{ prevMonth }}\" style=\"cursor:pointer;font:300 24px var(--fbody);color:var(--muted,#9a8d79);padding:4px 8px;user-select:none\">‹<\u002Fdiv>\n          <div style=\"font:500 24px var(--fdisplay,'Playfair Display',serif);color:var(--ink,#2c2722);text-transform:capitalize;min-width:150px;text-align:center\">{{ monthLabel }}<\u002Fdiv>\n          <div onclick=\"{{ nextMonth }}\" style=\"cursor:pointer;font:300 24px var(--fbody);color:var(--muted,#9a8d79);padding:4px 8px;user-select:none\">›<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin:18px 4px 22px\">\n          <div style=\"font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,#b08d57);margin-bottom:8px\">Mijn focus deze maand<\u002Fdiv>\n          <textarea value=\"{{ focus }}\" oninput=\"{{ onFocus }}\" rows=\"2\" placeholder=\"Waar wil je deze maand aan werken?\" style=\"width:100%;border:none;border-bottom:1.5px solid var(--line,#dccfb8);background:transparent;font:italic 400 var(--fs,16px)/1.7 var(--fbody,'Mulish',sans-serif);color:var(--ink,#2c2722);padding:4px 2px;min-height:40px;overflow:hidden\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <div style=\"font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,#b08d57);margin:0 4px 12px\">Doelen-tracker<\u002Fdiv>\n\n        <sc-for list=\"{{ habitsView }}\" as=\"habit\" hint-placeholder-count=\"3\">\n          <div style=\"background:var(--card2,rgba(0,0,0,0.02));border:var(--cardBorder,none);box-shadow:var(--cardShadow,none);border-radius:16px;padding:14px 14px 6px;margin-bottom:12px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">\n              <div style=\"font:600 15px var(--fbody);color:var(--ink,#2c2722)\">{{ habit.name }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <span style=\"font:600 12px var(--fbody);color:var(--accent,#b08d57)\">{{ habit.count }}/{{ habit.total }}<\u002Fspan>\n                <span onclick=\"{{ habit.remove }}\" style=\"cursor:pointer;font:400 18px var(--fbody);color:var(--muted,#9a8d79);line-height:1;user-select:none\">×<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div data-scroll=\"\" style=\"display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px\">\n              <sc-for list=\"{{ habit.days }}\" as=\"d\" hint-placeholder-count=\"30\">\n                <div onclick=\"{{ d.toggle }}\" style=\"flex:0 0 auto;width:30px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ d.cellBg }};border:{{ d.cellBorder }};color:{{ d.cellColor }};font:600 11px var(--fbody,'Mulish',sans-serif)\">{{ d.dayNum }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ addHabit }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:8px;align-items:center;margin-top:6px\">\n            <input value=\"{{ newHabit }}\" oninput=\"{{ onNewHabit }}\" onkeydown=\"{{ onHabitKey }}\" placeholder=\"Naam van je doel…\" style=\"flex:1;border:none;border-bottom:1.5px solid var(--line,#dccfb8);background:transparent;font:400 15px var(--fbody);color:var(--ink,#2c2722);padding:8px 2px\">\n            <div onclick=\"{{ saveHabit }}\" style=\"cursor:pointer;background:var(--accent,#b08d57);color:var(--onAccent,#fffaf0);border-radius:10px;padding:9px 16px;font:600 13px var(--fbody)\">Voeg toe<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notAddHabit }}\" hint-placeholder-val=\"{{ true }}\">\n          <div onclick=\"{{ toggleAdd }}\" style=\"cursor:pointer;text-align:center;border:1.5px dashed var(--line,#dccfb8);border-radius:12px;padding:13px;font:600 13px var(--fbody);color:var(--muted,#9a8d79);margin-top:6px\">+ &nbsp;Doel toevoegen<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ INSTELLINGEN ============ -->\n      <sc-if value=\"{{ isInstellingen }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:6px 22px 120px\">\n        <div style=\"text-align:center;margin:8px 0 4px;font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.26em;text-transform:uppercase;color:var(--accent,#b08d57)\">Het Logboek<\u002Fdiv>\n        <div style=\"text-align:center;font:500 26px var(--fdisplay,'Playfair Display',serif);color:var(--ink,#2c2722);margin:2px 0 24px\">Instellingen<\u002Fdiv>\n\n        <div style=\"font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,#b08d57);margin:0 2px 12px\">Stijl<\u002Fdiv>\n        <div onclick=\"{{ setBoek }}\" style=\"display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:rgba(0,0,0,0.02);box-shadow:inset 0 0 0 2px {{ boekRing }};margin-bottom:10px;cursor:pointer\">\n          <div style=\"display:flex;gap:4px\"><span style=\"width:16px;height:16px;border-radius:50%;background:#b08d57\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#fdfaf3;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#2c2722\"><\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:600 15px var(--fbody);color:var(--ink,#2c2722)\">Boek<\u002Fdiv><div style=\"font:400 12px var(--fbody);color:var(--muted,#9a8d79)\">Warm &amp; serif — trouw aan het boek<\u002Fdiv><\u002Fdiv>\n          <sc-if value=\"{{ themeBoek }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"color:var(--accent,#b08d57);font:700 16px var(--fbody)\">✓<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ setSereen }}\" style=\"display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:rgba(0,0,0,0.02);box-shadow:inset 0 0 0 2px {{ sereenRing }};margin-bottom:10px;cursor:pointer\">\n          <div style=\"display:flex;gap:4px\"><span style=\"width:16px;height:16px;border-radius:50%;background:#bd6a4f\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#faf7f2;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#312d27\"><\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:600 15px var(--fbody);color:var(--ink,#2c2722)\">Sereen<\u002Fdiv><div style=\"font:400 12px var(--fbody);color:var(--muted,#9a8d79)\">Zacht &amp; modern met terracotta<\u002Fdiv><\u002Fdiv>\n          <sc-if value=\"{{ themeSereen }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--accent,#b08d57);font:700 16px var(--fbody)\">✓<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n        <div onclick=\"{{ setMinimal }}\" style=\"display:flex;align-items:center;gap:13px;padding:14px;border-radius:14px;background:rgba(0,0,0,0.02);box-shadow:inset 0 0 0 2px {{ minimalRing }};margin-bottom:26px;cursor:pointer\">\n          <div style=\"display:flex;gap:4px\"><span style=\"width:16px;height:16px;border-radius:50%;background:#4d6fa8\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#ffffff;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1)\"><\u002Fspan><span style=\"width:16px;height:16px;border-radius:50%;background:#18181a\"><\u002Fspan><\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:600 15px var(--fbody);color:var(--ink,#2c2722)\">Minimal<\u002Fdiv><div style=\"font:400 12px var(--fbody);color:var(--muted,#9a8d79)\">Strak, koel met één accent<\u002Fdiv><\u002Fdiv>\n          <sc-if value=\"{{ themeMinimal }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--accent,#b08d57);font:700 16px var(--fbody)\">✓<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div style=\"font:600 11px var(--flabel,'Karla',sans-serif);letter-spacing:0.14em;text-transform:uppercase;color:var(--accent,#b08d57);margin:0 2px 12px\">Herinneringen<\u002Fdiv>\n        <div style=\"background:rgba(0,0,0,0.02);border-radius:16px;padding:6px 16px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line,#dccfb8)\">\n            <span style=\"font:600 15px var(--fbody);color:var(--ink,#2c2722)\">Reminders aan<\u002Fspan>\n            <div onclick=\"{{ toggleRem }}\" style=\"width:48px;height:28px;border-radius:20px;padding:3px;display:flex;align-items:center;justify-content:{{ remJustify }};background:{{ remTrack }};cursor:pointer;transition:all .2s\"><div style=\"width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25)\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line,#dccfb8)\">\n            <div style=\"display:flex;align-items:center;gap:9px\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"4.4\" fill=\"var(--accent,#b08d57)\"><\u002Fcircle><\u002Fsvg><span style=\"font:500 15px var(--fbody);color:var(--ink,#2c2722)\">Ochtend<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <input type=\"time\" value=\"{{ rem.morning }}\" oninput=\"{{ onMorning }}\" style=\"border:none;background:transparent;font:600 16px var(--fbody);color:var(--ink,#2c2722)\">\n              <div onclick=\"{{ toggleMorningOn }}\" style=\"width:40px;height:24px;border-radius:20px;padding:3px;display:flex;align-items:center;justify-content:{{ morningJustify }};background:{{ morningTrack }};cursor:pointer;transition:all .2s\"><div style=\"width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25)\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 0\">\n            <div style=\"display:flex;align-items:center;gap:9px\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\"><circle cx=\"9.5\" cy=\"10\" r=\"6\" fill=\"var(--accent,#b08d57)\"><\u002Fcircle><circle cx=\"13\" cy=\"8\" r=\"6\" fill=\"var(--paper,#fdfaf3)\"><\u002Fcircle><\u002Fsvg><span style=\"font:500 15px var(--fbody);color:var(--ink,#2c2722)\">Avond<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <input type=\"time\" value=\"{{ rem.evening }}\" oninput=\"{{ onEvening }}\" style=\"border:none;background:transparent;font:600 16px var(--fbody);color:var(--ink,#2c2722)\">\n              <div onclick=\"{{ toggleEveningOn }}\" style=\"width:40px;height:24px;border-radius:20px;padding:3px;display:flex;align-items:center;justify-content:{{ eveningJustify }};background:{{ eveningTrack }};cursor:pointer;transition:all .2s\"><div style=\"width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25)\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;margin-bottom:10px\">\n          <div onclick=\"{{ askPerm }}\" style=\"flex:1;text-align:center;cursor:pointer;background:var(--accent,#b08d57);color:var(--onAccent,#fffaf0);border-radius:12px;padding:13px;font:600 13px var(--fbody)\">{{ permLabel }}<\u002Fdiv>\n          <div onclick=\"{{ testNotif }}\" style=\"flex:1;text-align:center;cursor:pointer;border:1.5px solid var(--line,#dccfb8);color:var(--ink,#2c2722);border-radius:12px;padding:13px;font:600 13px var(--fbody)\">Testbericht<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font:400 12px/1.5 var(--fbody);color:var(--muted,#9a8d79);text-align:center;margin-bottom:26px\">Meldingen verschijnen op de ingestelde tijd zolang de app geopend is.<\u002Fdiv>\n\n        <div style=\"text-align:center;border-top:1px solid var(--line,#dccfb8);padding-top:20px\">\n          <div style=\"font:500 17px var(--fdisplay,'Playfair Display',serif);color:var(--ink,#2c2722)\">Het Logboek<\u002Fdiv>\n          <div style=\"font:400 12px/1.5 var(--fbody);color:var(--muted,#9a8d79);margin-top:4px\">Jouw dagelijkse ritueel,<br>geïnspireerd op het 6 minuten dagboek.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- tab bar -->\n    <div style=\"flex-shrink:0;display:flex;border-top:1px solid var(--line,#dccfb8);background:var(--paper,#fdfaf3);padding:9px 6px 24px;position:relative;z-index:6\">\n      <div onclick=\"{{ goVandaag }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding-top:3px\">\n        <div style=\"width:5px;height:5px;border-radius:50%;background:{{ tabCol.vandaag }}\"><\u002Fdiv>\n        <span style=\"font:600 11px var(--fbody,'Mulish',sans-serif);letter-spacing:0.01em;color:{{ tabCol.vandaag }}\">Vandaag<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goWeek }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding-top:3px\">\n        <div style=\"width:5px;height:5px;border-radius:50%;background:{{ tabCol.week }}\"><\u002Fdiv>\n        <span style=\"font:600 11px var(--fbody,'Mulish',sans-serif);letter-spacing:0.01em;color:{{ tabCol.week }}\">Week<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goDoelen }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding-top:3px\">\n        <div style=\"width:5px;height:5px;border-radius:50%;background:{{ tabCol.doelen }}\"><\u002Fdiv>\n        <span style=\"font:600 11px var(--fbody,'Mulish',sans-serif);letter-spacing:0.01em;color:{{ tabCol.doelen }}\">Doelen<\u002Fspan>\n      <\u002Fdiv>\n      <div onclick=\"{{ goInstellingen }}\" style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding-top:3px\">\n        <div style=\"width:5px;height:5px;border-radius:50%;background:{{ tabCol.instellingen }}\"><\u002Fdiv>\n        <span style=\"font:600 11px var(--fbody,'Mulish',sans-serif);letter-spacing:0.01em;color:{{ tabCol.instellingen }}\">Instellingen<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:10px;background:rgba(0,0,0,0.16);z-index:40;pointer-events:none\"><\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:900},&quot;showQuote&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Stijl&quot;},&quot;bigType&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Stijl&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[&quot;#b08d57&quot;,&quot;#bd6a4f&quot;,&quot;#4d6fa8&quot;,&quot;#7a9b76&quot;,&quot;#9a6f8f&quot;],&quot;default&quot;:null,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Stijl&quot;}}\">\nclass Component extends DCLogic {\n  KEY = 'hetlogboek_v1';\n  FIELDS = ['g1','g2','g3','great','affirm','deed','improve','n1','n2','n3'];\n\n  THEMES = {\n    boek: {\n      '--bg':'#e7ddcd','--paper':'#fdfaf3','--ink':'#2c2722','--muted':'#9a8d79',\n      '--accent':'#b08d57','--onAccent':'#fffaf0','--line':'#dccfb8',\n      '--card':'transparent','--card2':'rgba(120,95,55,0.05)','--cardBorder':'none','--cardShadow':'none','--cardRadius':'0px','--cardPad':'4px',\n      '--fdisplay':\"'Playfair Display',serif\",'--fbody':\"'Mulish',sans-serif\",'--flabel':\"'Karla',sans-serif\",\n      '--quoteFont':\"'Playfair Display',serif\",'--labelSpacing':'0.18em','--fs':'16px'\n    },\n    sereen: {\n      '--bg':'#e4dccf','--paper':'#faf7f2','--ink':'#332f29','--muted':'#a8a092',\n      '--accent':'#bd6a4f','--onAccent':'#fff8f4','--line':'#e7ded0',\n      '--card':'#ffffff','--card2':'#ffffff','--cardBorder':'1px solid #efe7da','--cardShadow':'0 8px 24px rgba(90,60,40,0.06)','--cardRadius':'20px','--cardPad':'16px',\n      '--fdisplay':\"'DM Serif Display',serif\",'--fbody':\"'Mulish',sans-serif\",'--flabel':\"'Mulish',sans-serif\",\n      '--quoteFont':\"'DM Serif Display',serif\",'--labelSpacing':'0.13em','--fs':'16px'\n    },\n    minimal: {\n      '--bg':'#e8e8e6','--paper':'#ffffff','--ink':'#18181a','--muted':'#a3a3a6',\n      '--accent':'#4d6fa8','--onAccent':'#ffffff','--line':'#e7e7e4',\n      '--card':'transparent','--card2':'rgba(0,0,0,0.025)','--cardBorder':'none','--cardShadow':'none','--cardRadius':'0px','--cardPad':'2px',\n      '--fdisplay':\"'Space Grotesk',sans-serif\",'--fbody':\"'Space Grotesk',sans-serif\",'--flabel':\"'Space Mono',monospace\",\n      '--quoteFont':\"'Space Grotesk',sans-serif\",'--labelSpacing':'0.2em','--fs':'16px'\n    }\n  };\n\n  QUOTES = [\n    {t:'De beste manier om de toekomst te voorspellen is om hem zelf te maken.',a:'Abraham Lincoln'},\n    {t:'Verspil je tijd niet met het zoeken naar een hindernis. Misschien is die er niet.',a:'Franz Kafka'},\n    {t:'Of je het leven nu lachend of huilend doorbrengt, het leven duurt even lang.',a:'Chinees spreekwoord'},\n    {t:'Als alles wat je probeert lukt, probeer je niet hard genoeg.',a:'Gordon Moore'},\n    {t:'Je hoeft niet geweldig te zijn om te beginnen, maar je moet wel beginnen om geweldig te zijn.',a:'Zig Ziglar'},\n    {t:'Geluk is niet iets kant-en-klaars. Het komt voort uit je eigen daden.',a:'Dalai Lama'},\n    {t:'De reis van duizend mijl begint met één stap.',a:'Lao Tzu'},\n    {t:'Wat je vandaag doet, kan al je morgens verbeteren.',a:'Ralph Marston'},\n    {t:'Het leven is wat er gebeurt terwijl je andere plannen maakt.',a:'John Lennon'},\n    {t:'Wie nooit een fout heeft gemaakt, heeft ie je nog nooit hebt gedaan.',\n    'Geef elke dag deze week iemand een oprecht compliment.',\n    'Sta \\u00e9\\u00e9n ochtend 30 minuten eerder op en gebruik die tijd voor jezelf.',\n    'Laat deze week \\u00e9\\u00e9n uur je telefoon volledig links liggen.',\n    'Schrijf een kaartje of bericht naar iemand die je dankbaar bent.',\n    'Zeg deze week \\u00e9\\u00e9n keer \\u2018nee\\u2019 tegen iets dat je eigenlijk niet wilt.'\n  ];\n\n  MO = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];\n  WD = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];\n\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = {\n      tab:'vandaag',\n      date:this.todayISO(),\n      month:this.todayISO().slice(0,7),\n      data:this.load(),\n      perm:(typeof Notification!=='undefined'?Notification.permission:'unsupported'),\n      addHabit:false,\n      newHabit:''\n    };\n  }\n\n  // ---- persistence ----\n  fresh(){\n    return {\n      theme:'boek',\n      entries:{}, week:{}, focus:{},\n      habits:[\n        {id:'h1',name:'Bewegen',marks:{}},\n        {id:'h2',name:'Water drinken',marks:{}},\n        {id:'h3',name:'Lezen',marks:{}}\n      ],\n      reminders:{enabled:false,morning:'08:00',evening:'21:00',morningOn:true,eveningOn:true}\n    };\n  }\n  load(){\n    try{ const r=JSON.parse(localStorage.getItem(this.KEY)); if(r){ const f=this.fresh(); return {...f,...r,reminders:{...f.reminders,...(r.reminders||{})}}; } }catch(e){}\n    return this.fresh();\n  }\n  persist(nd){ this.setState({data:nd}); try{ localStorage.setItem(this.KEY,JSON.stringify(nd)); }catch(e){} }\n\n  // ---- dates ----\n  iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  todayISO(){ return this.iso(new Date()); }\n  parse(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }\n  fmtDate(s){ const d=this.parse(s); return this.WD[d.getDay()]+' '+d.getDate()+' '+this.MO[d.getMonth()]; }\n  shiftDay(n){ const d=this.parse(this.state.date); d.setDate(d.getDate()+n); this.setState({date:this.iso(d)}); }\n  dayIndex(s){ const d=this.parse(s); const start=new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }\n  weekIdx(s){ const d=this.parse(s); const onejan=new Date(d.getFullYear(),0,1); return Math.floor(((d-onejan)/86400000 + onejan.getDay())/7); }\n  weekKey(s){ const d=this.parse(s); return d.getFullYear()+'-W'+this.weekIdx(s); }\n  gWeek(s){ const d=this.parse(s); return d.getFullYear()*53 + this.weekIdx(s); }\n  monthLabel(m){ const p=m.split('-'); return this.MO[Number(p[1])-1]+' '+p[0]; }\n  shiftMonth(n){ const p=this.state.month.split('-').map(Number); const d=new Date(p[0],p[1]-1+n,1); this.setState({month:this.iso(d).slice(0,7)}); }\n\n  quoteFor(s){ return this.QUOTES[this.dayIndex(s)%this.QUOTES.length]; }\n  weekQuestions(s){ const g=this.gWeek(s); const out=[]; for(let i=0;i<5;i++){ out.push(this.WEEKQ[((g*5+i)%this.WEEKQ.length+this.WEEKQ.length)%this.WEEKQ.length]); } return out; }\n  weekChallenge(s){ const g=this.gWeek(s); return this.WEEKC[((g%this.WEEKC.length)+this.WEEKC.length)%this.WEEKC.length]; }\n\n  // ---- entries ----\n  ev(f){ const e=this.state.data.entries[this.state.date]; return (e&&e[f])||''; }\n  autogrow(e){ const t=e.target; if(t.tagName==='TEXTAREA'){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,420)+'px'; } }\n  patchEntry(field,val){ const d=this.state.data; const e={...(d.entries[this.state.date]||{})}; e[field]=val; this.persist({...d,entries:{...d.entries,[this.state.date]:e}}); }\n  patchWeek(field,val){ const d=this.state.data; const k=this.weekKey(this.state.date); const w={...(d.week[k]||{})}; w[field]=val; this.persist({...d,week:{...d.week,[k]:w}}); }\n  patchFocus(val){ const d=this.state.data; this.persist({...d,focus:{...d.focus,[this.state.month]:val}}); }\n\n  // ---- habits ----\n  buildHabits(){\n    const m=this.state.month; const p=m.split('-').map(Number); const y=p[0], mm=p[1];\n    const days=new Date(y,mm,0).getDate(); const today=this.todayISO();\n    return this.state.data.habits.map(hb=>{\n      const arr=[]; let count=0;\n      for(let i=1;i<=days;i++){\n        const iso=m+'-'+String(i).padStart(2,'0');\n        const done=!!(hb.marks&&hb.marks[iso]); if(done)count++;\n        const isToday=iso===today;\n        const cellBg = done ? 'var(--accent,#b08d57)' : (isToday ? 'transparent' : 'var(--card2,rgba(0,0,0,0.03))');\n        const cellBorder = done ? '1px solid transparent' : (isToday ? '1.5px solid var(--accent,#b08d57)' : '1px solid transparent');\n        const cellColor = done ? 'var(--onAccent,#fff)' : (isToday ? 'var(--accent,#b08d57)' : 'var(--muted,#9a8d79)');\n        arr.push({iso,dayNum:i,done,isToday,cellBg,cellBorder,cellColor,toggle:()=>this.toggleHabit(hb.id,iso)});\n      }\n      return {id:hb.id,name:hb.name,count,total:days,days:arr,remove:()=>this.removeHabit(hb.id)};\n    });\n  }\n  toggleHabit(id,iso){ const d=this.state.data; const habits=d.habits.map(h=>{ if(h.id!==id)return h; const marks={...(h.marks||{})}; if(marks[iso])delete marks[iso]; else marks[iso]=1; return {...h,marks}; }); this.persist({...d,habits}); }\n  removeHabit(id){ const d=this.state.data; this.persist({...d,habits:d.habits.filter(h=>h.id!==id)}); }\n  addHabitFn(){ const n=(this.state.newHabit||'').trim(); if(!n)return; const d=this.state.data; this.persist({...d,habits:[...d.habits,{id:'h'+Date.now(),name:n,marks:{}}]}); this.setState({newHabit:'',addHabit:false}); }\n\n  // ---- theme ----\n  setThemeFn(name){ this.persist({...this.state.data,theme:name}); }\n  applyTheme(){\n    const el=this.rootRef.current; if(!el)return;\n    const t=this.THEMES[this.state.data.theme]||this.THEMES.boek;\n    const vars={...t};\n    if(this.props.accent){ vars['--accent']=this.props.accent; }\n    if(this.props.bigType){ vars['--fs']='18px'; }\n    for(const k in vars){ el.style.setProperty(k,vars[k]); }\n  }\n\n  // ---- reminders ----\n  setRem(field,val){ const d=this.state.data; this.persist({...d,reminders:{...d.reminders,[field]:val}}); }\n  notify(title,body){\n    const opts={body,icon:'icon-192.png',badge:'icon-192.png',tag:'hetlogboek'};\n    try{\n      if('serviceWorker' in navigator && navigator.serviceWorker.ready){\n        navigator.serviceWorker.ready.then(reg=>reg.showNotification(title,opts)).catch(()=>this._legacyNotify(title,opts));\n        return;\n      }\n    }catch(e){}\n    this._legacyNotify(title,opts);\n  }\n  _legacyNotify(title,opts){ try{ new Notification(title,opts); }catch(e){} }\n  requestPerm(){\n    if(typeof Notification==='undefined'){ alert('Meldingen worden niet ondersteund in deze omgeving.'); return; }\n    Notification.requestPermission().then(p=>{\n      this.setState({perm:p});\n      if(p==='granted'){ this.setRem('enabled',true); this.notify('Het Logboek','Reminders staan aan \\u2713'); }\n    });\n  }\n  testNotif(){\n    if(typeof Notification==='undefined' || Notification.permission!=='granted'){ this.requestPerm(); return; }\n    this.notify('Het Logboek \\u2600','Zo ziet je herinnering eruit. Tijd voor je ritueel.');\n  }\n  checkReminders(){\n    const r=this.state.data.reminders; if(!r.enabled)return;\n    if(typeof Notification==='undefined'||Notification.permission!=='granted')return;\n    const now=new Date(); const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');\n    const today=this.todayISO(); let fired={}; try{ fired=JSON.parse(localStorage.getItem('hl_fired')||'{}'); }catch(e){}\n    if(r.morningOn && hhmm===r.morning && fired['m'+today]!==1){ this.notify('Het Logboek \\u2600','Goedemorgen! Waar ben je vandaag dankbaar voor?'); fired['m'+today]=1; }\n    if(r.eveningOn && hhmm===r.evening && fired['e'+today]!==1){ this.notify('Het Logboek \\u263e','Hoe was je dag? Tijd voor je avondritueel.'); fired['e'+today]=1; }\n    try{ localStorage.setItem('hl_fired',JSON.stringify(fired)); }catch(e){}\n  }\n\n  componentDidMount(){ this.applyTheme(); this._timer=setInterval(()=>this.checkReminders(),20000); }\n  componentDidUpdate(){ this.applyTheme(); }\n  componentWillUnmount(){ clearInterval(this._timer); }\n\n  renderVals(){\n    const s=this.state, d=s.data;\n    const v={}, h={};\n    this.FIELDS.forEach(f=>{ v[f]=this.ev(f); h[f]=(e)=>{ this.autogrow(e); this.patchEntry(f,e.target.value); }; });\n\n    const wq=this.weekQuestions(s.date);\n    const wdata=d.week[this.weekKey(s.date)]||{};\n    const weekItems=wq.map((q,i)=>({q,n:i+1,val:wdata['q'+i]||'',on:(e)=>{ this.autogrow(e); this.patchWeek('q'+i,e.target.value); }}));\n    const cdone=!!wdata.cdone;\n\n    const ac='var(--accent,#b08d57)', mut='var(--muted,#9a8d79)';\n    const tabCol={\n      vandaag:s.tab==='vandaag'?ac:mut, week:s.tab==='week'?ac:mut,\n      doelen:s.tab==='doelen'?ac:mut, instellingen:s.tab==='instellingen'?ac:mut\n    };\n    const r=d.reminders;\n    const offTrack='#d6cdbd';\n\n    return {\n      rootRef:this.rootRef,\n      isVandaag:s.tab==='vandaag', isWeek:s.tab==='week', isDoelen:s.tab==='doelen', isInstellingen:s.tab==='instellingen',\n      goVandaag:()=>this.setState({tab:'vandaag'}), goWeek:()=>this.setState({tab:'week'}),\n      goDoelen:()=>this.setState({tab:'doelen'}), goInstellingen:()=>this.setState({tab:'instellingen'}),\n      tabCol,\n\n      dateLabel:this.fmtDate(s.date), notToday:s.date!==this.todayISO(),\n      prevDay:()=>this.shiftDay(-1), nextDay:()=>this.shiftDay(1), goToday:()=>this.setState({date:this.todayISO()}),\n      v,h,\n\n      quote:this.quoteFor(s.date), showQuote:(this.props.showQuote!==false),\n\n      weekItems, challenge:this.weekChallenge(s.date), cdone,\n      challengeBox: cdone ? 'var(--onAccent,#fffaf0)' : 'transparent',\n      toggleChallenge:()=>this.patchWeek('cdone',!cdone),\n\n      habitsView:this.buildHabits(), monthLabel:this.monthLabel(s.month),\n      prevMonth:()=>this.shiftMonth(-1), nextMonth:()=>this.shiftMonth(1),\n      focus:(d.focus&&d.focus[s.month])||'', onFocus:(e)=>{ this.autogrow(e); this.patchFocus(e.target.value); },\n      addHabit:s.addHabit, notAddHabit:!s.addHabit, newHabit:s.newHabit,\n      toggleAdd:()=>this.setState({addHabit:!s.addHabit,newHabit:''}),\n      onNewHabit:(e)=>this.setState({newHabit:e.target.value}),\n      onHabitKey:(e)=>{ if(e.key==='Enter')this.addHabitFn(); },\n      saveHabit:()=>this.addHabitFn(),\n\n      themeBoek:d.theme==='boek', themeSereen:d.theme==='sereen', themeMinimal:d.theme==='minimal',\n      boekRing:d.theme==='boek'?'var(--accent,#b08d57)':'transparent',\n      sereenRing:d.theme==='sereen'?'var(--accent,#b08d57)':'transparent',\n      minimalRing:d.theme==='minimal'?'var(--accent,#b08d57)':'transparent',\n      setBoek:()=>this.setThemeFn('boek'), setSereen:()=>this.setThemeFn('sereen'), setMinimal:()=>this.setThemeFn('minimal'),\n\n      rem:r,\n      remJustify:r.enabled?'flex-end':'flex-start', remTrack:r.enabled?ac:offTrack,\n      morningJustify:r.morningOn?'flex-end':'flex-start', morningTrack:r.morningOn?ac:offTrack,\n      eveningJustify:r.eveningOn?'flex-end':'flex-start', eveningTrack:r.eveningOn?ac:offTrack,\n      toggleRem:()=>this.setRem('enabled',!r.enabled),\n      toggleMorningOn:()=>this.setRem('morningOn',!r.morningOn),\n      toggleEveningOn:()=>this.setRem('eveningOn',!r.eveningOn),\n      onMorning:(e)=>this.setRem('morning',e.target.value), onEvening:(e)=>this.setRem('evening',e.target.value),\n      permLabel:s.perm==='granted'?'Meldingen aan \\u2713':'Meldingen toestaan',\n      askPerm:()=>this.requestPerm(), testNotif:()=>this.testNotif()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
